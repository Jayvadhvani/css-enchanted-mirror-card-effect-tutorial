  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: radial-gradient(circle at center, #1e1b4b 0%, #000000 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      perspective: 1000px;
    }

    /* Floating particles background */
    .particles { position: absolute; width: 100%; height: 100%; z-index: 0; }
    .particle {
      position: absolute; width: 4px; height: 4px; background: rgba(255, 255, 255, 0.5);
      border-radius: 50%; box-shadow: 0 0 10px rgba(255,255,255,0.8);
      animation: floatUp 10s infinite linear;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    .card-container {
      position: relative;
      width: 320px;
      height: 480px;
      z-index: 10;
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      transform-style: preserve-3d;
    }

    .card-container:hover {
      transform: translateY(-10px) rotateX(10deg) rotateY(-5deg);
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 
        0 30px 50px rgba(0,0,0,0.5),
        inset 0 0 20px rgba(255,255,255,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
      color: white;
    }

    /* The glowing "mirror" edge */
    .card::before {
      content: ''; position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(transparent, transparent, transparent, #8b5cf6, #d946ef, transparent);
      animation: rotate 4s linear infinite;
      z-index: -1;
      opacity: 0.5;
    }
    
    .card::after {
      content: ''; position: absolute;
      inset: 3px; background: #0f172a; border-radius: 17px; z-index: -1;
    }

    @keyframes rotate { 100% { transform: rotate(360deg); } }

    /* Card Content */
    .icon-container {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, #d946ef, #8b5cf6);
      border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      font-size: 3rem; margin-bottom: 25px;
      box-shadow: 0 0 30px rgba(217, 70, 239, 0.5);
      position: relative;
    }

    .icon-container::after {
      content: ''; position: absolute; inset: -10px;
      border-radius: 50%; border: 2px dashed rgba(255,255,255,0.3);
      animation: spin 10s linear infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    h2 { font-family: 'Cinzel', serif; font-size: 2rem; margin-bottom: 10px; letter-spacing: 2px; }
    p { color: #a5b4fc; font-size: 1rem; line-height: 1.5; margin-bottom: 30px; }

    .btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
      padding: 12px 30px; border-radius: 30px; color: white;
      text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.3s;
    }
    .btn:hover { background: white; color: #0f172a; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

    /* Glare effect on hover */
    .glare {
      position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-20deg); transition: 0.5s;
    }
    .card-container:hover .glare { left: 150%; }

  </style>

  <script>
    // Generate particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      particle.style.left = `${Math.random() * 100}vw`;
      particle.style.animationDelay = `${Math.random() * 5}s`;
      particle.style.animationDuration = `${5 + Math.random() * 10}s`;
      particlesContainer.appendChild(particle);
    }
  </script>
